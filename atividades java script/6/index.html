<!DOCTYPE html>
<html>
<body>
<input id="a"><input id="b">
<button onclick="calc('+')">+</button>
<button onclick="calc('-')">-</button>
<button onclick="calc('*')">*</button>
<button onclick="calc('/')">/</button>
<p id="res"></p>

<script>
function calc(op){
res.innerText=eval(a.value+op+b.value);
}
</script>
</body>
</html>
